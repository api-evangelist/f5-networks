    resources:
    - name: ltm-node
      path: /ltm/node
      operations:
      - name: listnodes
        method: GET
        description: List All Nodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnode
        method: POST
        description: Create a Node
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

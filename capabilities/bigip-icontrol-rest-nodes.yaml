          type: object
          description: Request body (JSON).
          required: true
      - name: deletenode
        method: DELETE
        description: Delete a Node
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-F5-Auth-Token
      value: '{{env.F5_NETWORKS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bigip-icontrol-rest-nodes-rest
    port: 8080
    description: REST adapter for F5 BIG-IP iControl REST API — Nodes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ltm/node
      name: ltm-node
      description: REST surface for ltm-node.
      operations:
      - method: GET
        name: listnodes
        description: List All Nodes
        call: bigip-icontrol-rest-nodes.listnodes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createnode
        description: Create a Node
        call: bigip-icontrol-rest-nodes.createnode
        with:

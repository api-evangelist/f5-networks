naftiko: "1.0.0-alpha1"

info:
  label: "F5 BIG-IP iControl REST"
  description: "Programmatic access to manage and configure F5 BIG-IP devices including virtual servers, pools, nodes, pool members, and profiles for application delivery and load balancing."
  tags:
    - F5
    - BIG-IP
    - Load Balancing
    - Application Delivery
    - Network Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      BIGIP_USERNAME: BIGIP_USERNAME
      BIGIP_PASSWORD: BIGIP_PASSWORD

capability:
  consumes:
    - type: http
      namespace: bigip-icontrol
      baseUri: https://{bigip_host}/mgmt/tm
      description: "F5 BIG-IP iControl REST API for managing LTM resources"
      authentication:
        type: basic
        username: "{{BIGIP_USERNAME}}"
        password: "{{BIGIP_PASSWORD}}"
      resources:
        - name: virtual-servers
          path: /ltm/virtual
          description: "Manage virtual servers for traffic direction"
          operations:
            - name: list-virtual-servers
              method: GET
              description: "List all virtual servers configured on the BIG-IP system"
              inputParameters:
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Select specific properties to return"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "Filter results by property values"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-virtual-server
              method: POST
              description: "Create a new virtual server resource"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  destination: "{{tools.destination}}"
                  pool: "{{tools.pool}}"
        - name: virtual-server
          path: /ltm/virtual/{virtualName}
          description: "Manage a specific virtual server"
          operations:
            - name: get-virtual-server
              method: GET
              description: "Get a specific virtual server by name"
              inputParameters:
                - name: virtualName
                  in: path
                  type: string
                  required: true
                  description: "Name of the virtual server"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-virtual-server
              method: PUT
              description: "Update a virtual server configuration"
              inputParameters:
                - name: virtualName
                  in: path
                  type: string
                  required: true
                  description: "Name of the virtual server"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  pool: "{{tools.pool}}"
                  description: "{{tools.description}}"
            - name: delete-virtual-server
              method: DELETE
              description: "Delete a virtual server"
              inputParameters:
                - name: virtualName
                  in: path
                  type: string
                  required: true
                  description: "Name of the virtual server"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: pools
          path: /ltm/pool
          description: "Manage pools of backend servers"
          operations:
            - name: list-pools
              method: GET
              description: "List all pools configured on the BIG-IP"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-pool
              method: POST
              description: "Create a new pool"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  monitor: "{{tools.monitor}}"
        - name: pool
          path: /ltm/pool/{poolName}
          description: "Manage a specific pool"
          operations:
            - name: get-pool
              method: GET
              description: "Get a specific pool by name"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-pool
              method: PUT
              description: "Update a pool configuration"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  monitor: "{{tools.monitor}}"
                  loadBalancingMode: "{{tools.loadBalancingMode}}"
            - name: delete-pool
              method: DELETE
              description: "Delete a pool"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: pool-members
          path: /ltm/pool/{poolName}/members
          description: "Manage pool members within a pool"
          operations:
            - name: list-pool-members
              method: GET
              description: "List all members of a pool"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-pool-member
              method: POST
              description: "Add a member to a pool"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
        - name: pool-member
          path: /ltm/pool/{poolName}/members/{memberName}
          description: "Manage a specific pool member"
          operations:
            - name: get-pool-member
              method: GET
              description: "Get a specific pool member"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
                - name: memberName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool member"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-pool-member
              method: PUT
              description: "Update a pool member"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
                - name: memberName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool member"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  session: "{{tools.session}}"
            - name: delete-pool-member
              method: DELETE
              description: "Remove a pool member"
              inputParameters:
                - name: poolName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool"
                - name: memberName
                  in: path
                  type: string
                  required: true
                  description: "Name of the pool member"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: nodes
          path: /ltm/node
          description: "Manage backend server nodes"
          operations:
            - name: list-nodes
              method: GET
              description: "List all nodes"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-node
              method: POST
              description: "Create a new node"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  address: "{{tools.address}}"
        - name: node
          path: /ltm/node/{nodeName}
          description: "Manage a specific node"
          operations:
            - name: get-node
              method: GET
              description: "Get a specific node"
              inputParameters:
                - name: nodeName
                  in: path
                  type: string
                  required: true
                  description: "Name of the node"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-node
              method: PUT
              description: "Update a node"
              inputParameters:
                - name: nodeName
                  in: path
                  type: string
                  required: true
                  description: "Name of the node"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  session: "{{tools.session}}"
                  description: "{{tools.description}}"
            - name: delete-node
              method: DELETE
              description: "Delete a node"
              inputParameters:
                - name: nodeName
                  in: path
                  type: string
                  required: true
                  description: "Name of the node"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: profiles
          path: /ltm/profile
          description: "Manage traffic handling profiles"
          operations:
            - name: list-http-profiles
              method: GET
              description: "List HTTP profiles"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-tcp-profiles
              method: GET
              description: "List TCP profiles"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-client-ssl-profiles
              method: GET
              description: "List client SSL profiles"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: bigip-icontrol-rest-api
      resources:
        - path: /v1/virtual-servers
          name: virtual-servers
          description: "Virtual server management"
          operations:
            - method: GET
              name: list-virtual-servers
              description: "List all virtual servers"
              call: "bigip-icontrol.list-virtual-servers"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-virtual-server
              description: "Create a virtual server"
              call: "bigip-icontrol.create-virtual-server"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pools
          name: pools
          description: "Pool management"
          operations:
            - method: GET
              name: list-pools
              description: "List all pools"
              call: "bigip-icontrol.list-pools"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/nodes
          name: nodes
          description: "Node management"
          operations:
            - method: GET
              name: list-nodes
              description: "List all nodes"
              call: "bigip-icontrol.list-nodes"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: bigip-icontrol-mcp
      transport: http
      tools:
        - name: list-virtual-servers
          description: "List all virtual servers on the BIG-IP"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-virtual-servers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-virtual-server
          description: "Get details of a specific virtual server"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.get-virtual-server"
          with:
            virtualName: "tools.virtualName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-virtual-server
          description: "Create a new virtual server"
          hints:
            readOnly: false
          call: "bigip-icontrol.create-virtual-server"
          with:
            name: "tools.name"
            destination: "tools.destination"
            pool: "tools.pool"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-virtual-server
          description: "Update a virtual server configuration"
          hints:
            readOnly: false
            idempotent: true
          call: "bigip-icontrol.update-virtual-server"
          with:
            virtualName: "tools.virtualName"
            pool: "tools.pool"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-virtual-server
          description: "Delete a virtual server"
          hints:
            destructive: true
            idempotent: true
          call: "bigip-icontrol.delete-virtual-server"
          with:
            virtualName: "tools.virtualName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pools
          description: "List all pools on the BIG-IP"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-pools"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pool
          description: "Get details of a specific pool"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.get-pool"
          with:
            poolName: "tools.poolName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-pool
          description: "Create a new server pool"
          hints:
            readOnly: false
          call: "bigip-icontrol.create-pool"
          with:
            name: "tools.name"
            monitor: "tools.monitor"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-pool
          description: "Update a pool configuration"
          hints:
            readOnly: false
            idempotent: true
          call: "bigip-icontrol.update-pool"
          with:
            poolName: "tools.poolName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-pool
          description: "Delete a pool"
          hints:
            destructive: true
            idempotent: true
          call: "bigip-icontrol.delete-pool"
          with:
            poolName: "tools.poolName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pool-members
          description: "List all members of a pool"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-pool-members"
          with:
            poolName: "tools.poolName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-pool-member
          description: "Add a member to a pool"
          hints:
            readOnly: false
          call: "bigip-icontrol.add-pool-member"
          with:
            poolName: "tools.poolName"
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-pool-member
          description: "Update a pool member"
          hints:
            readOnly: false
            idempotent: true
          call: "bigip-icontrol.update-pool-member"
          with:
            poolName: "tools.poolName"
            memberName: "tools.memberName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-pool-member
          description: "Remove a member from a pool"
          hints:
            destructive: true
            idempotent: true
          call: "bigip-icontrol.delete-pool-member"
          with:
            poolName: "tools.poolName"
            memberName: "tools.memberName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-nodes
          description: "List all backend nodes"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-nodes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-node
          description: "Get details of a specific node"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.get-node"
          with:
            nodeName: "tools.nodeName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-node
          description: "Create a new node"
          hints:
            readOnly: false
          call: "bigip-icontrol.create-node"
          with:
            name: "tools.name"
            address: "tools.address"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-node
          description: "Update a node"
          hints:
            readOnly: false
            idempotent: true
          call: "bigip-icontrol.update-node"
          with:
            nodeName: "tools.nodeName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-node
          description: "Delete a node"
          hints:
            destructive: true
            idempotent: true
          call: "bigip-icontrol.delete-node"
          with:
            nodeName: "tools.nodeName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-http-profiles
          description: "List HTTP traffic profiles"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-http-profiles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tcp-profiles
          description: "List TCP traffic profiles"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-tcp-profiles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-client-ssl-profiles
          description: "List client SSL profiles"
          hints:
            readOnly: true
            idempotent: true
          call: "bigip-icontrol.list-client-ssl-profiles"
          outputParameters:
            - type: object
              mapping: "$."

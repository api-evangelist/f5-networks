description: F5's API portfolio is split between customer-deployed management APIs (BIG-IP iControl REST,
  AS3, DO, Telemetry, NGINX Plus, NGINX One, NGINX Management Suite, NGINX Ingress Controller, BIG-IQ)
  and SaaS APIs (F5 Distributed Cloud Console, Essential App Protect). Customer-deployed APIs are bounded
  by the deployed device/instance capacity, not a vendor-published rate ceiling. F5 Distributed Cloud
  Console enforces per-tenant API throttling but does not publish numeric per-second limits in the public
  docs; tenant administrators can configure throttling on data-plane traffic.
notes: No published per-second numbers for either the management or SaaS API surfaces. Limits are tenant-/instance-bounded
  and configured by the customer.
sources:
  - https://clouddocs.f5.com/api/icontrol-rest/
  - https://docs.cloud.f5.com/docs/
  - https://docs.nginx.com/nginx-management-suite/
responseCodes:
  throttled: 429
  serverError: 500
  serviceUnavailable: 503
limits:
  - name: BIG-IP management plane (iControl REST)
    scope: device
    metric: varies
    limit: bounded by BIG-IP control-plane capacity (hardware model or VE size); not a published number
  - name: AS3 / Declarative Onboarding declarations
    scope: device
    metric: varies
    limit: serialized through control plane; submit + poll task pattern
  - name: NGINX Plus / NGINX Management Suite API
    scope: instance
    metric: varies
    limit: bounded by the deployed NGINX Plus instance; consult sizing guide for the deployed flavor
  - name: F5 Distributed Cloud Console API
    scope: tenant
    metric: varies
    limit: per-tenant throttling enforced by the SaaS control plane; numbers not published publicly
  - name: F5 Essential App Protect API
    scope: tenant
    metric: varies
    limit: per-tenant; not publicly published
policies:
  - name: Async task pattern
    description: AS3, DO, BIG-IQ, and Distributed Cloud long-running operations return a task URL; poll
      it for status rather than retrying the submit.
  - name: Token authentication
    description: Use token auth on iControl REST (POST /mgmt/shared/authn/login); use API tokens / certificate
      auth on Distributed Cloud Console; rotate before expiry.
  - name: Backoff with jitter
    description: 429/5xx responses indicate transient overload — back off exponentially with jitter on
      idempotent reads.
  - name: Customer-configured rate limiting
    description: BIG-IP and Distributed Cloud both expose rate-limit policy as a feature on the data plane;
      this is a tool the customer configures for their own consumers, not a vendor-imposed ceiling.
  - name: Sizing guides
    description: For deployed products (BIG-IP, NGINX Plus, BIG-IQ), throughput is bounded by the licensed
      form factor — refer to F5 sizing guides for the platform in use.

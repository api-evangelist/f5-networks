specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: F5 Networks
providerId: f5-networks
publisherName: F5, Inc.
serviceCategory: Application Delivery / Multi-Cloud Security
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Gateway
  - Application Delivery
  - Automation
  - Edge Computing
  - Kubernetes
  - Load Balancing
  - Multi-Cloud
  - NGINX
  - Security
  - WAF
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for F5 Networks: cost is dominated by the BIG-IP / NGINX Plus / App
  Protect license model (Subscription, Perpetual, FCP) plus consumption against F5 Distributed Cloud
  services (CDN, WAF, Bot Defense, API Security). API access itself has no per-call charge.'
notes: F5 publishes no list prices for the full portfolio. Reconcile against active quotes and Distributed
  Cloud consumption reports.
sources:
  - https://www.f5.com/products/get-f5
  - https://www.f5.com/cloud
  - https://docs.cloud.f5.com/docs/
principles:
  - name: Visibility
    description: Track BIG-IP / NGINX Plus / BIG-IQ instance entitlement; pull Distributed Cloud usage
      reports from the F5 Customer 360 portal; reconcile FCP true-up reports each quarter.
  - name: Allocation
    description: Allocate license cost by environment / business unit (BIG-IP partitions, NGINX Plus per-instance,
      Distributed Cloud per-tenant/per-namespace). Tag VE instances and Distributed Cloud sites with team/product.
  - name: Optimization
    description: Right-size BIG-IP VE flavors; consolidate NGINX Plus instances onto NGINX One Console
      for fleet management; choose FCP for variable demand workloads; cache aggressively at Distributed
      Cloud edge to lower egress and request meters; tune App Protect policies to avoid false-positive
      bot challenges that drive bot-management volume.
  - name: Accountability
    description: Network/platform team owns BIG-IP and NGINX entitlement; security team owns App Protect
      / Distributed Cloud Bot Defense; product teams own per-VS / per-namespace consumption. Annual license
      review; quarterly FCP true-up; monthly Distributed Cloud usage review.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Subscription / Perpetual / Flex Consumption + SaaS Usage
  billingFrequency: Annual (Subscription/FCP), One-Time (Perpetual), Monthly (Distributed Cloud usage)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Tax
  chargeFrequency: Recurring (Subscription/FCP/Distributed Cloud) or One-Time (Perpetual)
focusColumns:
  ServiceName: F5 Networks
  ServiceCategory: Application Delivery / Multi-Cloud Security
  ProviderName: F5
  PublisherName: F5, Inc.
  InvoiceIssuerName: F5, Inc.
  PricingCategory: Subscription / Perpetual / FCP / Usage
  PricingUnit: instance | request | GB | transaction
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: bigip_instances
    description: Count of licensed BIG-IP instances (hardware or VE).
    unit: instance
    aggregation: max
    dimensions:
      - environment
      - region
      - form_factor
  - name: nginx_plus_instances
    description: Count of licensed NGINX Plus instances.
    unit: instance
    aggregation: max
    dimensions:
      - environment
      - region
  - name: app_protect_instances
    description: App Protect / Advanced WAF entitled instances.
    unit: instance
    aggregation: max
    dimensions:
      - product
  - name: distributed_cloud_requests
    description: F5 Distributed Cloud HTTP/L7 requests (CDN, WAF, API Security, Bot Defense).
    unit: request
    aggregation: sum
    dimensions:
      - service
      - tenant
      - namespace
      - region
  - name: distributed_cloud_egress
    description: F5 Distributed Cloud egress data.
    unit: GB
    aggregation: sum
    dimensions:
      - service
      - tenant
      - region
  - name: fcp_commitment
    description: Annual FCP commitment $; trues up to actual usage.
    unit: USD
    aggregation: sum
    dimensions:
      - year
      - service
apis:
  - name: F5 BIG-IP iControl REST API
    baseURL: https://{{bigip_host}}/mgmt/tm
    serviceName: F5 BIG-IP iControl REST API
    serviceCategory: API
  - name: F5 Distributed Cloud API
    baseURL: https://{{tenant}}.console.ves.volterra.io/api
    serviceName: F5 Distributed Cloud API
    serviceCategory: API
  - name: F5 NGINX Management Suite API
    baseURL: https://{{nms-host}}/api
    serviceName: F5 NGINX Management Suite API
    serviceCategory: API
  - name: F5 Essential App Protect API
    baseURL: https://api.f5.com/app-protect
    serviceName: F5 Essential App Protect API
    serviceCategory: API
  - name: F5 BIG-IQ Centralized Management API
    baseURL: https://{{bigiq_host}}/mgmt
    serviceName: F5 BIG-IQ Centralized Management API
    serviceCategory: API
  - name: F5 BIG-IP Application Services 3 Extension API
    baseURL: https://{{bigip_host}}/mgmt/shared/appsvcs
    serviceName: F5 BIG-IP Application Services 3 Extension API
    serviceCategory: API
  - name: F5 Declarative Onboarding API
    baseURL: https://{{bigip_host}}/mgmt/shared/declarative-onboarding
    serviceName: F5 Declarative Onboarding API
    serviceCategory: API
  - name: F5 Telemetry Streaming API
    baseURL: https://{{bigip_host}}/mgmt/shared/telemetry
    serviceName: F5 Telemetry Streaming API
    serviceCategory: API
  - name: F5 NGINX Plus API
    baseURL: https://{{nginx_host}}/api
    serviceName: F5 NGINX Plus API
    serviceCategory: API
  - name: F5 NGINX One Console API
    baseURL: https://{{nginx-one-host}}/api
    serviceName: F5 NGINX One Console API
    serviceCategory: API
  - name: F5 NGINX Ingress Controller API
    baseURL: https://{{kubernetes_host}}
    serviceName: F5 NGINX Ingress Controller API
    serviceCategory: API
unitEconomics:
  - name: Cost per BIG-IP instance / year
    metric: total_license_cost / bigip_instances
    target: model-dependent
  - name: Cost per 1M Distributed Cloud requests
    metric: distributed_cloud_cost / (distributed_cloud_requests / 1000000)
    target: tier-dependent
  - name: FCP true-up variance
    metric: (actual_usage - committed) / committed
    target: minimize positive variance
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

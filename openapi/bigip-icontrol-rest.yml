components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication using BIG-IP admin credentials. The
        username and password are sent base64-encoded in the Authorization
        header.
    tokenAuth:
      type: apiKey
      in: header
      name: X-F5-Auth-Token
      description: >-
        Token-based authentication. Obtain a token by POSTing credentials
        to /mgmt/shared/authn/login, then pass the token value in the
        X-F5-Auth-Token header for subsequent requests.

  parameters:
    VirtualNameParam:
      name: virtualName
      in: path
      required: true
      description: >-
        Name of the virtual server resource. Use ~Common~ prefix for
        partition-qualified names (e.g., ~Common~my_virtual).
      schema:
        type: string
      example: my_virtual_server

    PoolNameParam:
      name: poolName
      in: path
      required: true
      description: >-
        Name of the pool resource. Use ~Common~ prefix for
        partition-qualified names.
      schema:
        type: string
      example: my_pool

    MemberNameParam:
      name: memberName
      in: path
      required: true
      description: >-
        Name of the pool member in the format address:port
        (e.g., 10.0.0.1:80).
      schema:
        type: string
      example: '10.0.0.1:80'

    NodeNameParam:
      name: nodeName
      in: path
      required: true
      description: >-
        Name of the node resource. Can be the IP address or a
        user-defined name.
      schema:
        type: string
      example: '10.0.0.1'

    ProfileNameParam:
      name: profileName
      in: path
      required: true
      description: Name of the profile resource.
      schema:
        type: string
      example: my_http_profile

    SelectParam:
      name: $select
      in: query
      required: false
      description: >-
        Comma-separated list of property names to include in the response.
      schema:
        type: string
      example: name,destination,pool

    FilterParam:
      name: $filter
      in: query
      required: false
      description: OData filter expression to restrict returned resources.
      schema:
        type: string
      example: partition eq Common

    TopParam:
      name: $top
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
        minimum: 1
      example: 10

    SkipParam:
      name: $skip
      in: query
      required: false
      description: Number of resources to skip before returning results.
      schema:
        type: integer
        minimum: 0
      example: 0

    ExpandSubcollectionsParam:
      name: expandSubcollections
      in: query
      required: false
      description: >-
        When set to true, expands all subcollections inline within the
        response.
      schema:
        type: string
        enum:
        - 'true'
        - 'false'
      example: 'true'

  schemas:
    VirtualServer:
      type: object
      description: >-
        A virtual server resource that directs client traffic to a pool
        of backend servers based on an IP address and port combination.
      properties:
        kind:
          type: string
          description: Resource type identifier.
          example: tm:ltm:virtual:virtualstate
          readOnly: true
        name:
          type: string
          description: Name of the virtual server resource.
          example: my_virtual_server
        fullPath:
          type: string
          description: Full path including partition.
          example: /Common/my_virtual_server
          readOnly: true
        generation:
          type: integer
          description: Configuration generation counter.
          readOnly: true
          example: 10
        selfLink:
          type: string
          format: uri
          description: Self-referencing URI for this resource.
          readOnly: true
          example: https://www.example.com
        addressStatus:
          type: string
          description: >-
            Whether the virtual contributes to the operational status of
            the associated virtual address.
          enum:
          - 'yes'
          - 'no'
          default: 'yes'
          example: 'yes'
        autoLasthop:
          type: string
          description: >-
            Automatic last hop setting for return traffic routing.
          enum:
          - default
          - enabled
          - disabled
          default: default
          example: default
        cmpEnabled:
          type: string
          description: >-
            Whether Clustered Multi-Processing (CMP) acceleration is
            enabled.
          enum:
          - 'yes'
          - 'no'
          default: 'yes'
          example: 'yes'
        connectionLimit:
          type: integer
          description: >-
            Maximum number of concurrent connections allowed. A value of
            0 means unlimited.
          minimum: 0
          default: 0
          example: 0
        description:
          type: string
          description: User-defined description of the virtual server.
          example: Production web virtual server
        destination:
          type: string
          description: >-
            Destination IP address and service port in the format
            /partition/address:port or /partition/address.port.
          example: /Common/10.0.0.100:80
        disabled:
          type: boolean
          description: >-
            When true, the virtual server does not accept new connections.
          example: true
        enabled:
          type: boolean
          description: >-
            When true, the virtual server accepts and processes traffic.
          example: true
        fallbackPersistence:
          type: string
          description: >-
            Persistence profile to use when the primary persistence method
            fails.
          example: /Common/source_addr
        gtmScore:
          type: integer
          description: >-
            Score value used by Global Traffic Manager for load balancing
            decisions.
          default: 0
          example: 10
        ipProtocol:
          type: string
          description: IP protocol for the virtual server.
          enum:
          - tcp
          - udp
          - sctp
          - any
          example: tcp
        mask:
          type: string
          description: >-
            Network mask for the destination address. Use
            255.255.255.255 for host-specific virtual servers.
          example: 255.255.255.255
        mirror:
          type: string
          description: >-
            Whether connection and persistence mirroring is enabled for
            high availability failover.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        nat64:
          type: string
          description: Whether NAT64 translation is enabled.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        partition:
          type: string
          description: Administrative partition containing this resource.
          default: Common
          example: Common
        persist:
          type: array
          description: Persistence profiles applied to the virtual server.
          items:
            type: object
            properties:
              name:
                type: string
                example: cookie
              tmDefault:
                type: string
                enum:
                - 'yes'
                - 'no'
          example: []
        pool:
          type: string
          description: >-
            Default pool for directing traffic. Specified as a full path
            (e.g., /Common/my_pool).
          example: /Common/my_pool
        profiles:
          type: array
          description: Profiles applied to the virtual server.
          items:
            type: object
            properties:
              name:
                type: string
                example: http
              context:
                type: string
                enum:
                - all
                - clientside
                - serverside
                example: all
              fullPath:
                type: string
                example: /Common/http
          example: []
        rateLimit:
          type: string
          description: >-
            Maximum number of connections per second. A value of disabled
            or 0 means no limit.
          default: disabled
          example: example_value
        rateLimitMode:
          type: string
          description: Scope of rate limiting.
          enum:
          - object
          - object-source
          - object-destination
          - object-source-destination
          default: object
          example: object
        rules:
          type: array
          description: iRules applied to the virtual server.
          items:
            type: string
          example:
          - /Common/my_irule
        source:
          type: string
          description: >-
            Source address filter. Only connections from this network
            are accepted.
          default: 0.0.0.0/0
          example: 0.0.0.0/0
        sourcePort:
          type: string
          description: Source port translation behavior.
          enum:
          - preserve
          - preserve-strict
          - change
          default: preserve
          example: preserve
        synCookieStatus:
          type: string
          description: Current SYN Cookie protection status.
          readOnly: true
          enum:
          - not-activated
          - activated
          example: not-activated
        translateAddress:
          type: string
          description: Whether address translation is enabled.
          enum:
          - enabled
          - disabled
          default: enabled
          example: enabled
        translatePort:
          type: string
          description: Whether port translation is enabled.
          enum:
          - enabled
          - disabled
          default: enabled
          example: enabled
        vlansEnabled:
          type: boolean
          description: Whether VLAN filtering is enabled.
          example: true
        vlansDisabled:
          type: boolean
          description: Whether the virtual server is disabled on listed VLANs.
          example: true
        vlans:
          type: array
          description: List of VLANs on which the virtual server is enabled or disabled.
          items:
            type: string
          example:
          - /Common/external
        vsIndex:
          type: integer
          description: System-assigned index for the virtual server.
          readOnly: true

          example: 10
    VirtualServerCreate:
      type: object
      description: Request body for creating a new virtual server.
      required:
      - name
      - destination
      properties:
        name:
          type: string
          description: Name of the virtual server.
          example: my_virtual_server
        partition:
          type: string
          description: Administrative partition.
          default: Common
          example: example_value
        destination:
          type: string
          description: >-
            Destination address and port in /partition/address:port format.
          example: /Common/10.0.0.100:80
        description:
          type: string
          description: User-defined description.
          example: A sample description.
        ipProtocol:
          type: string
          description: IP protocol.
          enum:
          - tcp
          - udp
          - sctp
          - any
          example: tcp
        mask:
          type: string
          description: Destination network mask.
          example: 255.255.255.255
        pool:
          type: string
          description: Default pool full path.
          example: /Common/my_pool
        profiles:
          type: array
          description: Profiles to apply.
          items:
            type: object
            properties:
              name:
                type: string
              context:
                type: string
                enum:
                - all
                - clientside
                - serverside
          example: []
        persist:
          type: array
          description: Persistence profiles to apply.
          items:
            type: object
            properties:
              name:
                type: string
              tmDefault:
                type: string
                enum:
                - 'yes'
                - 'no'
          example: []
        source:
          type: string
          description: Source address filter.
          default: 0.0.0.0/0
          example: example_value
        sourcePort:
          type: string
          description: Source port translation behavior.
          enum:
          - preserve
          - preserve-strict
          - change
          example: preserve
        translateAddress:
          type: string
          enum:
          - enabled
          - disabled
          example: enabled
        translatePort:
          type: string
          enum:
          - enabled
          - disabled
          example: enabled
        connectionLimit:
          type: integer
          minimum: 0
          example: 10
        rules:
          type: array
          items:
            type: string
          example: []
        vlans:
          type: array
          items:
            type: string
          example: []
        vlansEnabled:
          type: boolean
          example: true
        vlansDisabled:
          type: boolean

          example: true
    VirtualServerUpdate:
      type: object
      description: Request body for updating a virtual server.
      properties:
        description:
          type: string
          example: A sample description.
        destination:
          type: string
          example: example_value
        ipProtocol:
          type: string
          enum:
          - tcp
          - udp
          - sctp
          - any
          example: tcp
        mask:
          type: string
          example: example_value
        pool:
          type: string
          example: example_value
        profiles:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              context:
                type: string
                enum:
                - all
                - clientside
                - serverside
          example: []
        persist:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              tmDefault:
                type: string
          example: []
        source:
          type: string
          example: example_value
        sourcePort:
          type: string
          enum:
          - preserve
          - preserve-strict
          - change
          example: preserve
        translateAddress:
          type: string
          enum:
          - enabled
          - disabled
          example: enabled
        translatePort:
          type: string
          enum:
          - enabled
          - disabled
          example: enabled
        connectionLimit:
          type: integer
          minimum: 0
          example: 10
        enabled:
          type: boolean
          example: true
        disabled:
          type: boolean
          example: true
        mirror:
          type: string
          enum:
          - enabled
          - disabled
          example: enabled
        rateLimit:
          type: string
          example: example_value
        rules:
          type: array
          items:
            type: string
          example: []
        vlans:
          type: array
          items:
            type: string
          example: []
        vlansEnabled:
          type: boolean
          example: true
        vlansDisabled:
          type: boolean
          example: true
        fallbackPersistence:
          type: string

          example: example_value
    Pool:
      type: object
      description: >-
        A pool resource that contains a group of backend server members
        used for load balancing traffic from virtual servers.
      properties:
        kind:
          type: string
          description: Resource type identifier.
          example: tm:ltm:pool:poolstate
          readOnly: true
        name:
          type: string
          description: Name of the pool resource.
          example: my_pool
        fullPath:
          type: string
          description: Full path including partition.
          example: /Common/my_pool
          readOnly: true
        generation:
          type: integer
          description: Configuration generation counter.
          readOnly: true
          example: 10
        selfLink:
          type: string
          format: uri
          description: Self-referencing URI.
          readOnly: true
          example: https://www.example.com
        allowNat:
          type: string
          description: Whether the pool can load balance NAT connections.
          enum:
          - 'yes'
          - 'no'
          default: 'yes'
          example: 'yes'
        allowSnat:
          type: string
          description: Whether the pool can load balance SNAT connections.
          enum:
          - 'yes'
          - 'no'
          default: 'yes'
          example: 'yes'
        description:
          type: string
          description: User-defined description.
          example: A sample description.
        ignorePersistedWeight:
          type: string
          description: >-
            Whether to ignore persisted weight when calculating load
            distribution.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        ipTosToClient:
          type: string
          description: Type of Service level for client-bound outgoing packets.
          default: pass-through
          example: example_value
        ipTosToServer:
          type: string
          description: Type of Service level for server-bound outgoing packets.
          default: pass-through
          example: example_value
        linkQosToClient:
          type: string
          description: QoS level for outgoing packets to clients.
          default: pass-through
          example: example_value
        linkQosToServer:
          type: string
          description: QoS level for outgoing packets to servers.
          default: pass-through
          example: example_value
        loadBalancingMode:
          type: string
          description: Load balancing algorithm used to distribute traffic.
          enum:
          - round-robin
          - ratio-member
          - least-connections-member
          - observed-member
          - predictive-member
          - ratio-node
          - least-connections-node
          - fastest-node
          - observed-node
          - predictive-node
          - dynamic-ratio-node
          - fastest-app-response
          - least-sessions
          - dynamic-ratio-member
          - weighted-least-connections-member
          - weighted-least-connections-node
          - ratio-session
          - ratio-least-connections-member
          - ratio-least-connections-node
          default: round-robin
          example: round-robin
        minActiveMembers:
          type: integer
          description: >-
            Minimum number of active members for priority-group
            activation.
          minimum: 0
          default: 0
          example: 10
        minUpMembers:
          type: integer
          description: >-
            Minimum number of operational pool members required before
            action is taken.
          minimum: 0
          default: 0
          example: 10
        minUpMembersAction:
          type: string
          description: >-
            Action to take when the number of operational members falls
            below the minimum.
          enum:
          - failover
          - reboot
          - restart-all
          default: failover
          example: failover
        minUpMembersChecking:
          type: string
          description: Whether minimum member monitoring is enabled.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        monitor:
          type: string
          description: >-
            Health monitor or monitor rule applied to pool members.
            Specify multiple monitors with 'and' or 'min N of'.
          example: /Common/http
        partition:
          type: string
          description: Administrative partition.
          default: Common
          example: example_value
        queueDepthLimit:
          type: integer
          description: Maximum number of connections queued per member.
          minimum: 0
          default: 0
          example: 10
        queueOnConnectionLimit:
          type: string
          description: Whether to queue connections when limits are reached.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        queueTimeLimit:
          type: integer
          description: Maximum time in milliseconds a connection can remain queued.
          minimum: 0
          default: 0
          example: 10
        reselectTries:
          type: integer
          description: Number of reselection attempts after a passive failure.
          minimum: 0
          default: 0
          example: 10

    HttpProfile:
      type: object
      description: >-
        An HTTP profile that defines how the BIG-IP processes HTTP
        traffic for a virtual server.
      properties:
        kind:
          type: string
          example: tm:ltm:profile:http:httpstate
          readOnly: true
        name:
          type: string
          example: http
        fullPath:
          type: string
          readOnly: true
          example: example_value
        generation:
          type: integer
          readOnly: true
          example: 10
        selfLink:
          type: string
          format: uri
          readOnly: true
          example: https://www.example.com
        acceptXff:
          type: string
          description: Whether to accept X-Forwarded-For headers from clients.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        appService:
          type: string
          example: example_value
        basicAuthRealm:
          type: string
          description: Realm for HTTP Basic authentication challenges.
          default: none
          example: example_value
        defaultsFrom:
          type: string
          description: Parent profile from which this profile inherits settings.
          example: /Common/http
        description:
          type: string
          example: A sample description.
        encryptCookies:
          type: array
          description: List of cookie names to encrypt.
          items:
            type: string
          example: []
        enforcement:
          type: object
          properties:
            maxHeaderCount:
              type: integer
              description: Maximum number of HTTP headers.
              default: 64
            maxHeaderSize:
              type: integer
              description: Maximum total header size in bytes.
              default: 32768
            pipeline:
              type: string
              description: Whether HTTP pipelining is allowed.
              enum:
              - allow
              - reject
              - pass-through
          example: example_value
        fallbackHost:
          type: string
          description: Fallback host for HTTP redirects.
          example: example_value
        fallbackStatusCodes:
          type: array
          description: HTTP status codes that trigger fallback redirection.
          items:
            type: string
          example: []
        headerErase:
          type: string
          description: Regular expression for headers to remove from responses.
          example: example_value
        headerInsert:
          type: string
          description: Header to insert into requests.
          example: example_value
        insertXforwardedFor:
          type: string
          description: Whether to insert an X-Forwarded-For header.
          enum:
          - enabled
          - disabled
          default: disabled
          example: enabled
        oneconnectTransformations:
          type: string
          description: Whether to rewrite HTTP connections for OneConnect.
          enum:
          - enabled
          - disabled
          default: enabled
          example: enabled
        redirectRewrite:
          type: string
          description: Redirect rewrite mode.
          enum:
          - none
          - all
          - matching
          - nodes
          example: none
        requestChunking:
          type: string
          description: How to handle chunked requests.
          enum:
          - allow
          - preserve
          - rechunk
          - selective
          example: allow
        responseChunking:
          type: string
          description: How to handle chunked responses.
          enum:
          - allow
          - preserve
          - rechunk
          - selective
          example: allow
        serverAgentName:
          type: string
          description: Server agent string to include in responses.
          example: example_value
        viaHostName:
          type: string
          description: Hostname to use in Via headers.
          example: example_value
        viaRequest:
          type: string
          description: Via header handling for requests.
          enum:
          - append
          - preserve
          - remove
          example: append
        viaResponse:
          type: string
          description: Via header handling for responses.
          enum:
          - append
          - preserve
          - remove
          example: append
        xffAlternativeNames:
          type: array
          description: Alternative header names for X-Forwarded-For.
          items:
            type: string

          example: []
    TcpProfile:
      type: object
      description: >-
        A TCP profile that defines how the BIG-IP processes TCP traffic,
        including connection settings, timeouts, and optimization.
      properties:
        kind:
          type: string
          example: tm:ltm:profile:tcp:tcpstate
          readOnly: true
        name:
          type: string
          example: tcp
        fullPath:
          type: string
          readOnly: true
          example: example_value
        generation:
          type: integer
          readOnly: true
          example: 10
        selfLink:
          type: string
          format: uri
          readOnly: true
          example: https://www.example.com
        abc:
          type: string
          description: Whether Appropriate Byte Counting is enabled.
          enum:
          - enabled
          - disabled
          example: enabled
        ackOnPush:
          type: string
          description: Whether to send ACK on PUSH flag.
          enum:
          - enabled
          - disabled
          example: enabled
        closeWaitTimeout:
          type: integer
          description: Timeout in seconds for CLOSE-WAIT state.
          example: 10
        congestionControl:
          type: string
          description: TCP congestion control algorithm.
          enum:
          - high-speed
          - cdg
          - chd
          - cubic
          - illinois
          - new-reno
          - none
          - reno
          - scalable
          - vegas
          - westwood
          - woodside
          example: high-speed
        defaultsFrom:
          type: string
          description: Parent profile.
          example: /Common/tcp
        deferredAccept:
          type: string
          description: Whether to defer connection acceptance.
          enum:
          - enabled
          - disabled
          example: enabled
        description:
          type: string
          example: A sample description.
        finWaitTimeout:
          type: integer
          description: Timeout in seconds for FIN-WAIT state.
          example: 10
        idleTimeout:
          type: integer
          description: >-
            Idle timeout in seconds. Connections idle longer than this
            value are closed.
          example: 10
        initCwnd:
          type: integer
          description: Initial TCP congestion window size.
          example: 10
        initRwnd:
          type: integer
          description: Initial TCP receive window size.
          example: 10
        keepAliveInterval:
          type: integer
          description: Interval in seconds between TCP keep-alive probes.
          example: 10
        maxRetrans:
          type: integer
          description: Maximum number of TCP retransmission attempts.
          example: 10
        maxSegmentSize:
          type: integer
          description: Maximum segment size (MSS) in bytes.
          example: 10
        nagle:
          type: string
          description: Nagle algorithm setting.
          enum:
          - auto
          - enabled
          - disabled
          example: auto
        receiveWindowSize:
          type: integer
          description: TCP receive window size in bytes.
          example: 10
        sendBufferSize:
          type: integer
          description: TCP send buffer size in bytes.
          example: 10
        synMaxRetrans:
          type: integer
          description: Maximum SYN retransmission attempts.
          example: 10
        timeWaitRecycle:
          type: string
          description: Whether to recycle TIME-WAIT connections.
          enum:
          - enabled
          - disabled
          example: enabled
        timeWaitTimeout:
          type: integer
          description: Timeout in milliseconds for TIME-WAIT state.

          example: 10

specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: F5 Networks
providerId: f5-networks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Gateway
  - Application Delivery
  - Automation
  - Edge Computing
  - Kubernetes
  - Load Balancing
  - Multi-Cloud
  - NGINX
  - Security
  - WAF
description: F5's broader product family (BIG-IP, BIG-IQ, NGINX Plus / Management Suite / One Console
  / Ingress Controller, Distributed Cloud, App Protect) is sold through enterprise channels — Subscription
  (1/2/3-year terms), Perpetual (GBB), or Flex Consumption Program (3- or 5-year annual commitments).
  Distributed Cloud is consumption-based with metered services. NGINX Plus has a published per-instance
  list price model but most enterprise pricing is quoted via sales. Public list pricing is not maintained
  for the full portfolio.
notes: F5 does not publish list prices for the full portfolio. Plans below describe licensing programs
  and product packaging rather than per-API-call pricing. Reconcile against active quotes / consumption
  reports in F5 Customer 360.
sources:
  - https://www.f5.com/products/get-f5
  - https://www.f5.com/products/big-ip-services
  - https://www.f5.com/cloud
  - https://www.nginx.com/products/nginx/
plans:
  - id: f5-networks-trial
    name: 30-Day Free Trial
    type: freemium
    description: Self-service evaluation across F5 product lines (BIG-IP, NGINX Plus, App Protect, Distributed
      Cloud free tier).
    entries:
      - label: Trial license
        description: Time-bounded trial across selected products.
        name: trial_license
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: F5 BIG-IP iControl REST API
      - name: F5 NGINX Plus API
      - name: F5 Distributed Cloud API (free tier)
      - name: F5 Essential App Protect API
  - id: f5-networks-subscription
    name: Subscription
    type: subscription
    description: 1-, 2-, or 3-year term subscription. Includes maintenance and support.
    entries:
      - label: Subscription per instance
        description: Per-instance subscription; pricing negotiated with F5 sales or reseller.
        name: subscription
        type: subscription
        metric: instance
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 1/2/3-year terms
      - name: Maintenance & Support
      - name: Version updates
      - name: BIG-IP, BIG-IQ, NGINX Plus, App Protect modules
  - id: f5-networks-perpetual
    name: Perpetual (Good-Better-Best / GBB)
    type: enterprise
    description: Perpetual licensing. Lifetime license validity for selected services and instance counts.
    entries:
      - label: Perpetual license
        description: Lifetime license for selected services.
        name: perpetual_license
        type: flat
        metric: instance
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Lifetime validity
      - name: GBB bundles
      - name: Optional support contract
  - id: f5-networks-flex
    name: Flex Consumption Program (FCP)
    type: enterprise
    description: 3- or 5-year annual spending commitment for deployable software and SaaS/managed services
      (including Distributed Cloud). Yearly true-up against actual usage.
    entries:
      - label: Annual commitment
        description: Annual spend commitment with usage-based true-up; covers premium support, software
          upgrades, activity reporting.
        name: fcp_commitment
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 3- or 5-year commitment
      - name: Annual usage true-up
      - name: Premium Support
      - name: Software upgrades
      - name: Activity reporting
      - name: Distributed Cloud Services
      - name: NGINX One / NGINX Plus
      - name: BIG-IP modules
  - id: f5-networks-distributed-cloud-consumption
    name: F5 Distributed Cloud — Usage
    type: usage-based
    description: Distributed Cloud (formerly Volterra) bills services like CDN, WAF, Bot Defense, DNS,
      and API Security on a usage basis (egress, requests, bot transactions). List rates are quoted; consumption
      reported in Customer 360.
    entries:
      - label: Service consumption
        description: Per-service metered consumption (requests, GB, transactions). Per-unit pricing quoted
          by F5 sales.
        name: xc_usage
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://{{tenant}}.console.ves.volterra.io/api
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: F5 Distributed Cloud API
      - name: WAF / Bot Defense / API Security / CDN / DNS modules
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

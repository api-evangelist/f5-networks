description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: f5-networks-free
    name: Free
    type: freemium
    description: Free entry tier for the F5 Networks API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://{{bigip_host}}/mgmt/tm
          - https://{{tenant}}.console.ves.volterra.io/api
          - https://{{nms-host}}/api
          - https://api.f5.com/app-protect
          - https://{{bigiq_host}}/mgmt
          - https://{{bigip_host}}/mgmt/shared/appsvcs
          - https://{{bigip_host}}/mgmt/shared/declarative-onboarding
          - https://{{bigip_host}}/mgmt/shared/telemetry
          - https://{{nginx_host}}/api
          - https://{{nginx-one-host}}/api
          - https://{{kubernetes_host}}
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://{{bigip_host}}/mgmt/tm
          - https://{{tenant}}.console.ves.volterra.io/api
          - https://{{nms-host}}/api
          - https://api.f5.com/app-protect
          - https://{{bigiq_host}}/mgmt
          - https://{{bigip_host}}/mgmt/shared/appsvcs
          - https://{{bigip_host}}/mgmt/shared/declarative-onboarding
          - https://{{bigip_host}}/mgmt/shared/telemetry
          - https://{{nginx_host}}/api
          - https://{{nginx-one-host}}/api
          - https://{{kubernetes_host}}
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: F5 BIG-IP iControl REST API
      - name: F5 Distributed Cloud API
      - name: F5 NGINX Management Suite API
      - name: F5 Essential App Protect API
      - name: F5 BIG-IQ Centralized Management API
      - name: F5 BIG-IP Application Services 3 Extension API
      - name: F5 Declarative Onboarding API
